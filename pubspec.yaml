name: paysaral
description: "Paysaral Fintech App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  cupertino_icons: ^1.0.2
  image_picker: ^1.0.7
  carousel_slider: ^5.1.2
  shared_preferences: ^2.5.5
  dio: ^5.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/paysaral-logo.png
    - assets/images/paysaral-logo-1.png
    - assets/images/login-bg.png
    - assets/images/register-bg.png
    - assets/images/welcome-logo.png
    - assets/images/bg1.png
    - assets/images/bg2.png
    - assets/images/bharat_connect.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/paysaral-logo-1.png"
  min_sdk_android: 21
